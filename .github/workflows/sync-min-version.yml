# Bumps min_version.txt in this repo to match the published release tag.
# The auth server (Render) reads that file at runtime (with a 30-second
# in-process cache) so changing it does NOT trigger a Render redeploy
# and therefore does NOT wipe the free-plan ephemeral SQLite database.
#
# No external secrets are needed — the workflow uses the built-in
# GITHUB_TOKEN which already has write access to this repo.

name: Sync min_version.txt on release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"   # strip leading v
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION"

      - name: Update min_version.txt
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.ver.outputs.version }}
          REPO:        ${{ github.repository }}
        run: |
          set -euo pipefail

          # Fetch current SHA (file may not exist on a brand-new repo).
          SHA=$(gh api "repos/$REPO/contents/min_version.txt" --jq '.sha' 2>/dev/null || echo "")
          B64=$(printf '%s\n' "$NEW_VERSION" | base64 -w0)

          if [ -n "$SHA" ]; then
            gh api -X PUT "repos/$REPO/contents/min_version.txt" \
              -f message="Bump min_version → $NEW_VERSION (release $NEW_VERSION)" \
              -f sha="$SHA" \
              -f content="$B64" > /dev/null
          else
            gh api -X PUT "repos/$REPO/contents/min_version.txt" \
              -f message="Create min_version.txt → $NEW_VERSION" \
              -f content="$B64" > /dev/null
          fi

          echo "✅ min_version.txt = $NEW_VERSION"
          echo "Server will pick this up within ~30s (in-process cache TTL)."
